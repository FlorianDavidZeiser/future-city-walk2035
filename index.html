acts:[
{t:"Komfort als Versprechen",sub:"Das Versprechen",
story:{lbl:"Logbuch \u00b7 Quartiersingenieurin Mara \u00b7 Montag, 06:12",
txt:"Die Drohne bringt den Kaffee. Pünktlich. Wie jeden Morgen.\n\nMara steht auf dem Dach von Block 4 und lächelt. Solarpanels, 14 Kilowatt seit Sonnenaufgang. Im Keller das Mikrorechenzentrum, dessen Abwärme Block 7 heizt. Auf der Straße: autonome Shuttles, lautlos, pünktlich, kostenlos.\n\nSie liebt diese Stadt. Alles fließt. Energie, Daten, Waren. Eine Plattform steuert alles: Wartung, Lieferung, Zugang, Temperatur. Effizient. Unsichtbar. Elegant.\n\nSeit 247 Tagen keine einzige Störung.\n\nDann, um 11:03, kommt die Drohne nicht.\nZum ersten Mal.\n\nMara ruft die Leitstelle an. Besetzt.\nSie öffnet das Dashboard. 'Verbindung wird hergestellt…'\n\nEs ist wahrscheinlich nichts."},

ok:"Richtig. Die Story zeigt es klar: EINE Plattform steuert alles. Wartung, Lieferung, Zugang, Temperatur. Wenn sie stockt, stockt nicht ein Teil, sondern das ganze Quartier. Effizienz und Verwundbarkeit haben dieselbe Wurzel.",
no:"Schau nochmal ins Logbuch. Mara beschreibt, wie das Quartier funktioniert: Wer steuert Wartung, Lieferung, Zugang, Temperatur? Wie viele Systeme sind das und wie viele Plattformen?"},

{t:"Wer steuert das Quartier?",sub:"Stadtgebiet",
ref:"Die Drohne, die am Montag nicht kam, war nur das erste Symptom. Jetzt sieht Mara tiefer.",
story:{lbl:"Logbuch \u00b7 Mara \u00b7 Dienstag, 14:30",
txt:"Mara öffnet die Betreiberübersicht.\n\nEin Konzern verwaltet 60% der Gebäude im Quartier. Wartung, Zugänge, Energie-Routing, Sicherheitslogik: alles läuft über seine Plattform. Die restlichen 40% nutzen drei kleinere Anbieter, die sich gegenseitig nicht verstehen.\n\nDrei Sensoren in Sektor West melden verzögert. Eine halbe Sekunde Latenz. Normalerweise irrelevant.\n\nAber seit gestern ist Mara aufmerksam.\n\nSie scrollt zurück. 2027: Anschläge auf Infrastruktur in drei Großstädten. Die Reaktion: verschmolzene Sicherheitslogik. Kameras, Sensorik, Zugang, Leitstellen: alles in einem System. Effizienter. Aber auch: ein einziger Angriffspunkt.\n\nSie fragt sich, wer hier noch den Überblick hat. Nicht die Software. Die versteht nur Datenpunkte."},

{f:"\ud83d\udcca",t:"Modernisierung läuft.\nAber nur dort, wo der große\nBetreiber investiert.\nDie kleinen Anbieter hinken hinterher."}],

ok:"Genau. Modularer Bau, staatliche Programme und Robotik treiben voran. Aber: Ein Konzern mit 60% Kontrolle und die Verschmelzung aller Sicherheitssysteme verdichten das Risiko. Was effizient klingt, wird bei Störung zum Flächenproblem.",

{t:"Kaskade im Keller",sub:"Gebäude",
ref:"Die Drohne von Montag. Die Latenz von Dienstag. Jetzt, Dienstagabend, kommt die dritte Störung, diesmal im Gebäude selbst.",
story:{lbl:"Logbuch \u00b7 Mara \u00b7 Dienstagabend, 19:47",
txt:"Block 4, Untergeschoss.\n\nDer Speicher zeigt 31%. Normalerweise kein Problem, nachts sinkt der Verbrauch, morgens laden die Panels nach.\n\nAber heute Abend läuft die Wärmepumpe auf Volllast, weil das Rechenzentrum im Keller Überstunden macht. Gleichzeitig laden 40 E-Autos in der Tiefgarage. Und die Plattform, die das normalerweise priorisiert? Reagiert verzögert, wie schon gestern die Sensoren in Sektor West.\n\nMara greift zum Handbetrieb-Schalter.\nDann zögert sie.\n\nWann hat sie das letzte Mal manuell eingegriffen?\nSie weiß es nicht mehr.\n\nDer Speicher fällt auf 28%."},
cards:[
{f:"\u26a1",t:"Speicher: 31%. Wärmepumpe: Volllast.\n40 E-Autos laden. Die Plattform\npriorisiert nicht mehr rechtzeitig."},
{f:"\ud83d\udd27",t:"Handbetrieb-Schalter.\nMara greift hin.\nDann zögert sie.\nWann hat sie das letzte Mal\nmanuell eingegriffen?"},
{f:"\ud83c\udf21\ufe0f",t:"Abwärme aus Block 4 heizt Block 7.\nEffizient, solange Block 4 läuft.\nFällt er aus, friert Block 7.",req:"atlas"}],

ok:"Genau die Reihenfolge. Erst versagt die Steuerung, dann kollidieren die Lasten, dann reicht der Speicher nicht und am Ende fehlt die analoge Kompetenz zum manuellen Eingriff. Von der Plattform bis zum Schalter: eine Kaskade.",
no:"Denk an Maras Abend: Was passiert zuerst. Die Plattform-Verzögerung oder der Speicherabfall? Was kommt als Letztes?"},
jrnl:"Kaskade: Plattform versagt, Lasten kollidieren, Speicher sinkt, Handeingriff scheitert. Der Fehler bleibt nie lokal."}],

ok:"Sauber rekonstruiert. Maras drei Tage zeigen: Effizienz entsteht durch enge Kopplung und genau dort sitzt die Kaskadenlogik. Robuste Antwort: Puffer, Fallbacks, Transparenz.",
no:"Erinnere dich an Maras Logbücher: Montag die Drohne, Dienstag die Sensoren, Dienstagabend der Keller. Was verbindet die drei Störungen?"},

{id:"silent",t:"Als die Systeme verstummten",sub:"Was Menschen leisten, wenn Systeme schweigen",col:"#fb923c",glow:"rgba(251,146,60,.07)",
leit:"Was bleibt funktionsfähig, wenn digitale Abhängigkeiten reißen?",
dna:["Stromausfälle","GPS-Störungen","Inselbetrieb","Taskforces","Analoge Routinen","Soziale Ungleichheit"],
acts:[
{t:"Die andere Stille",sub:"Der Ausfall",
story:{lbl:"Nachtprotokoll \u00b7 Leitstellenoperatorin Jara \u00b7 23:47",
txt:"GPS-Signal: weg.\n\nErst Sektor Nord. Dann Ost. Dann alles.\nBildschirm 4 dunkel. Bildschirm 7 auch.\n\nDer 47. Stromausfall in diesem Quartal. Das ist kein Ausnahmefall mehr. Das ist der Normalzustand.\n\nJara greift zum Notprotokoll. Papier, nicht digital. Sie hat es letzte Woche ausgedruckt, als eine Kollegin davon sprach, dass die Notspeicher unter 30% gefallen sind.\n\nDer Notspeicher springt an. 23% Ladung. Damit kommt man durch die Nacht. Knapp.\n\nDraußen wird es still.\nNicht die normale Stille.\nDie andere.\n\nAber dann: Licht in Block A. Jemand hat den Generator angeworfen. Und im Treppenhaus von Block B riecht es nach Suppe. Drei Familien teilen sich vier Teller.\n\nDie Systeme schweigen. Aber die Menschen nicht."},
cards:[{f:"\u26a1",t:"Stromausfall Nr. 47 in diesem Quartal.\nDas ist kein Ausnahmefall mehr.\nDas ist der Normalzustand."},{f:"\ud83d\udcf1",t:"GPS weg. Navigation weg.\nLogistik weg. Alarmsysteme\nohne Positionsdaten.\nAlles hängt am GPS."},{f:"\u2753",t:"Notspeicher: 23% Ladung.\nReicht für eine Nacht.\nWenn nichts anderes ausfällt."}],
narr:"47 Ausfälle. Drei Signale gleichzeitig: Strom, GPS, Bildschirme.\nKein Zufall. Eine Verkettung.\nHättest du gewusst, wo der Notschalter ist?",
chal:{type:"select",q:"Was destabilisiert die Stadt, wenn zentrale Systeme ausfallen?",
opts:[{t:"Strom, GPS und Datendienste fallen gleichzeitig aus und reißen alle darauf aufbauenden Systeme mit.",ok:true},{t:"Die Bevölkerung weigert sich, Notmaßnahmen umzusetzen.",ok:false},{t:"Es fehlen Investitionen in erneuerbare Energien.",ok:false},{t:"Einzelne Gebäude verlieren ihre Klimasteuerung.",ok:false}],
ok:"Genau. Jaras Protokoll zeigt: Nicht EIN Ausfall ist das Problem. GPS, Strom und Bildschirme fallen gleichzeitig und damit Logistik, Alarme, Navigation. Die Verkettung macht es zur Krise.",
no:"Lies Jaras Protokoll nochmal: Was fällt alles aus? Zähle die Systeme. Was hängt am GPS, was am Strom, was an den Bildschirmen?"},
jrnl:"Nicht ein Ausfall ist das Problem, sondern die Verkettung. GPS, Strom und Daten reißen gleichzeitig und nehmen alles mit."},
{t:"Drei Blocks, drei Realitäten",sub:"Stadtgebiet",
ref:"Drei Tage nach dem Ausfall. 23% Notspeicher haben nicht gereicht. Jetzt sieht Jara, was die Krise mit dem Quartier macht.",
story:{lbl:"Feldnotiz \u00b7 Jara \u00b7 Tag 3 nach dem Ausfall",
txt:"Jara läuft durch das Quartier.\n\nBlock A hat Strom. Eigener Speicher, eigener Generator, eigenes Protokoll. Die Bewohner haben sich organisiert.\n\nBlock B improvisiert. Jemand hat einen alten Diesel-Generator aus den 2020ern aufgetrieben. Er läuft, aber niemand weiß, wie lange.\n\nBlock C wartet. Kein Speicher, kein Generator, kein Plan. Die Bewohner stehen im Treppenhaus.\n\nIm Supermarkt kostet Milch 8,40 Euro. Letzte Woche waren es 3,20. Die Lieferkette ist nicht gerissen. Sie ist löchrig geworden.\n\nResilienz, denkt Jara. Früher ein Schlagwort. Heute der Unterschied zwischen Block A und Block C."},
cards:[{f:"\ud83c\udfe0",t:"Block A hat Strom: eigener Speicher,\neigenes Protokoll, organisierte Bewohner.\nBlock C wartet. Kein Plan."},{f:"\ud83d\udcb0",t:"Milch: 8,40 Euro. Letzte Woche: 3,20.\nDie Lieferkette ist löchrig.\nWer Geld hat, kauft Sicherheit.",req:"fallback"},{f:"\ud83e\udda0",t:"Corona 2.0 trifft ein System,\ndas schon am Boden liegt.\nDiesmal gibt es keine zentrale\nKrisenkoordination."}],
narr:"Block A, B, C: drei Nachbarn, drei Welten.\nResilienz ist kein Schlagwort. Es ist der Abstand zwischen Licht und Dunkelheit.",
chal:{type:"classify",q:"Was stabilisiert in der Krise und was verschärft sie?",catA:"Stabilisiert",catB:"Verschärft",
items:[{t:"Lokale Speicher und eigene Generatoren (wie Block A)",c:"A"},{t:"Abhängigkeit von zentralen Plattformen ohne lokalen Fallback",c:"B"},{t:"Analoge Rückfall-Routinen und Nachbarschaftsorganisation",c:"A"},{t:"Fehlende Standards zwischen den Inselbetriebs-Lösungen",c:"B"},{t:"Improvisierte Kurzfrist-Lösungen ohne langfristigen Plan (wie Block B)",c:"B"}],
ok:"Richtig. Block A zeigt: Lokale Speicher, eigene Routinen und Organisation stabilisieren. Block B und C zeigen: Improvisation ohne Standards und Abhängigkeit ohne Fallback verschärfen die Krise.",
no:"Vergleiche die drei Blocks: Was hat Block A, was Block C nicht hat? Und warum ist Block B zwar besser dran als C, aber trotzdem keine echte Lösung?"},
jrnl:"Lokale Resilienz stabilisiert, aber ohne gemeinsame Standards wird Inselbetrieb zum Flickenteppich."},
{t:"Handbetrieb auf Papier",sub:"Gebäude",
ref:"Woche 6. Der akute Ausfall ist vorbei. Aber einen Plan für nächstes Mal? Hat niemand.",
story:{lbl:"Feldnotiz \u00b7 Jara \u00b7 Woche 6, Taskforce-Sitzung Nr. 23",
txt:"Jara sitzt im Lagezentrum, ein umfunktionierter Konferenzraum mit Whiteboards voller Post-its.\n\nDie Taskforce hat den akuten Ausfall im Griff. 23 Sitzungen. Unzählige Nachtschichten.\n\n'Wir brauchen Standards für den Inselbetrieb', sagt sie.\nJemand nickt. Jemand anderes sagt: 'Dafür ist gerade keine Zeit.'\n\nAuf ihrem Schreibtisch: ein Wartungsprotokoll. Handschriftlich. Weil das Dokumentationssystem seit vier Wochen offline ist.\n\nSie denkt an Block C. An die Bewohner im Treppenhaus. An die 23% Notspeicher, die nicht gereicht haben.\n\nNächstes Mal, denkt sie, muss es anders laufen.\nAber wer schreibt den Plan, wenn alle mit der Gegenwart beschäftigt sind?"},
cards:[{f:"\ud83d\udccb",t:"Wartungsprotokoll: handschriftlich.\nDas Dokumentationssystem ist\nseit vier Wochen offline."},{f:"\ud83d\udd0c",t:"Inselbetrieb läuft, aber jedes\nGebäude macht es anders.\nKein gemeinsamer Standard.\nKein übertragbares Protokoll."},{f:"\ud83e\udd1d",t:"'Standards brauchen wir.'\n'Dafür ist gerade keine Zeit.'\nGenau das ist das Problem."}],
narr:"23 Sitzungen. Ein handschriftliches Protokoll. Und die Frage:\nWer schreibt den Plan für nächstes Mal, wenn alle mit der Gegenwart kämpfen?",
chal:{type:"multi",q:"Welche zwei Maßnahmen wären am robustesten für nächstes Mal?",n:2,
opts:[{t:"Noch stärkere Vernetzung über eine zentrale Cloud-Plattform.",ok:false},{t:"Einheitliche Inselbetrieb-Standards mit regelmäßig geübten Notfall-Routinen.",ok:true},{t:"Komplette Rückkehr zu rein analogen Systemen.",ok:false},{t:"Lokale Speicher mit Mindestkapazität und dokumentierter Fallback-Logik.",ok:true}],
ok:"Genau. Jaras Erfahrung zeigt: Weder mehr Zentralisierung noch totale Rückkehr zum Analogen. Sondern: Standards für den Inselbetrieb, die man üben kann und lokale Speicher, die über 23% hinauskommen. Beides zusammen ist Resilienz.",
no:"Erinnere dich an Block A vs. Block C und an den 23%-Notspeicher. Was hätte Block C gebraucht? Und warum hilft 'noch mehr Vernetzung' nicht, wenn die Vernetzung selbst das Problem war?"},
jrnl:"Krisenfestigkeit entsteht durch geübte Fallbacks und gemeinsame Standards, nicht durch mehr Vernetzung oder totale Rückkehr zum Analogen."}],
recon:{g:[{lbl:"Leitmotiv",opts:[{t:"Vernetzte Systeme werden unzuverlässig. Wer lokal handlungsfähig ist, übersteht die Krise.",ok:true},{t:"Technologie ist grundsätzlich unzuverlässig.",ok:false},{t:"Nur staatliche Großprojekte stabilisieren Infrastruktur.",ok:false}]},{lbl:"Verwundbarkeit",opts:[{t:"Jeder Block improvisiert allein. Ohne gemeinsame Standards wird lokale Autonomie zum Flickenteppich.",ok:true},{t:"Zu viel Regulierung verhindert schnelle Krisenreaktionen.",ok:false},{t:"Der Hauptfehler ist mangelnde Digitalisierung.",ok:false}]},{lbl:"Kl\u00fcgster Gegenzug",opts:[{t:"Vollständige Rückkehr zu analogen Systemen.",ok:false},{t:"Standards für den Inselbetrieb, lokale Speicher und regelmäßig geübte Notfallroutinen.",ok:true},{t:"Alle Systeme auf einer einzigen Plattform zentralisieren.",ok:false}]}],
ok:"Jaras Fall ist rekonstruiert: Wenn digitale Abhängigkeiten reißen, entscheidet lokale Handlungsfähigkeit. Aber ohne gemeinsame Standards wird jeder Inselbetrieb zum Einzelfall. Klügster Gegenzug: Standards, Speicher, geübte Routinen.",
no:"Denk an Jaras drei Stationen: Die Nacht mit 23% Speicher, die drei Blocks am Tag 3, die Taskforce in Woche 6. Was hat funktioniert, was nicht?"},
brief:{sum:"Wenn zentrale Systeme verstummen, entscheidet lokale Handlungsfähigkeit. Aber Inselbetrieb braucht Standards, sonst wird er zum Flickenteppich.",pts:["Strom, GPS und Datendienste fallen wiederholt gleichzeitig aus","Quartiere arbeiten im Inselbetrieb, aber ohne gemeinsame Standards","Langfristige Planung tritt hinter Krisenmanagement zurück","Soziale Ungleichheit nimmt zu: Block A hat Licht, Block C wartet im Dunkeln"]}},

{id:"utopia",t:"Utopia",sub:"Die Stadt, die alles hat und eine Frage",col:"#4ade80",glow:"rgba(74,222,128,.07)",
leit:"Was wird zur Herausforderung, wenn Mangel kein Antrieb mehr ist?",
dna:["Fusionsenergie","Energiepositive Gebäude","Vertical Gardens","KI-Medizin","Longevity","Grundeinkommen"],
acts:[
{t:"Eine Welt ohne Mangel",sub:"Das Staunen",
story:{lbl:"Tagebuch \u00b7 Architektin Lena \u00b7 Morgens",
txt:"Vor meinem Fenster blüht die Fassade. Erdbeeren im November, Tomaten im Januar. Vertical Gardens an jedem Block, gesteuert von KI-Systemen, die Licht, Wasser und Nährstoffe optimieren.\n\nEs ist wunderschön.\n\nFusionsenergie läuft im dritten Jahr. Die Gebäude speisen mehr ein, als sie verbrauchen. Nachts leuchten die Fassaden sanft, nicht aus Verschwendung, sondern weil der Überschuss gespeichert werden muss.\n\nTyp-2-Diabetes: geheilt. Flächendeckend seit 2033. Krebs? Lena musste nachschlagen, was das genau war, als jemand davon erzählte. Das Wort klang fremd, wie aus einem alten Film.\n\nDie Luft riecht nach Regen und Basilikum. Kinder spielen auf der Dachterrasse. Niemand eilt. Im Erdgeschoss repariert jemand eine Geige, nicht weil er muss, sondern weil er will.\n\nLena steht am Fenster und lächelt.\nDas hier ist die Welt, von der unsere Eltern geträumt haben."},
cards:[{f:"\u269b\ufe0f",t:"Fusion läuft. Seit drei Jahren.\nDie Gebäude speisen mehr ein,\nals sie verbrauchen. Energie ist gelöst."},{f:"\ud83e\uddec",t:"Krebs? Musste nachschlagen.\nTyp-2-Diabetes: geheilt seit 2033.\nDie großen Krankheiten sind Geschichte."},{f:"\ud83c\udf3f",t:"Auf dem Dach w\u00e4chst ein Garten.\nKinder ernten Erdbeeren im November.\nDie Stadt riecht nach Leben."}],
narr:"Fusion. Geheilte Krankheiten. Erdbeeren im November.\nLenas Welt hat geschafft, wovon Generationen tr\u00e4umten.\nStell dir vor: Du lebst hier.",
chal:{type:"select",q:"Was macht diese Welt so lebenswert?",
opts:[{t:"Energie, Gesundheit und Ernährung sind gelöst. Zum ersten Mal in der Geschichte fehlt es an nichts Materiellem.",ok:true},{t:"Die KI-Systeme sind so intelligent, dass Menschen keine Fehler mehr machen.",ok:false},{t:"Strenge Regulierung sorgt für gerechte Verteilung.",ok:false},{t:"Die Stadt ist autark und braucht keinen Austausch mit der Außenwelt.",ok:false}],
ok:"Genau. Lenas Welt zeigt: Wenn Energie, Gesundheit und Ernährung gelöst sind, verändert sich alles. Nicht weil Probleme verschwinden, sondern weil völlig neue Möglichkeiten entstehen. Das ist das Versprechen dieser Zukunft.",
no:"Lies Lenas Tagebuch nochmal. Was beschreibt sie? Welche konkreten Probleme sind gelöst und was ermöglicht das?"},
jrnl:"Energie, Gesundheit, Ernährung: gelöst. Zum ersten Mal ist materieller Mangel keine Grenze mehr. Diese Welt hat das Versprechen eingelöst."},
{t:"Überfluss als Aufgabe",sub:"Stadtgebiet",
ref:"Lena hat gelächelt. Alles ist möglich. Aber jetzt, im Büro, merkt sie: Nicht jeder lächelt.",
story:{lbl:"Tagebuch \u00b7 Lena \u00b7 Mittwoch",
txt:"Im Büro. Ein Entwurf für ein neues Quartier. Energiepositive Gebäude, Vertical Gardens, KI-Gesundheitsstationen in jedem Block.\n\nTechnisch perfekt. Und trotzdem fragt Lena sich, ob es jemanden berührt.\n\nIhr Kollege erzählt vom Grundeinkommensmodell. Er arbeitet noch, aber er müsste nicht. 'Ich mache es, weil ich es will', sagt er. 'Aber was ist mit denen, die nicht wissen, was sie wollen?'\n\nDie Quantenrechner optimieren Verkehr, Energie, Gesundheit. Alles wird besser, schneller, effizienter.\n\nAber Kein Algorithmus optimiert Sinn.\n\nLena schaut auf ihren Entwurf. Perfekte Energiebilanz. Perfekte Flächen. Und eine Frage, die sie nicht einzeichnen kann."},

{t:"Raum ohne Zweck",sub:"Gebäude",

acts:[
{t:"Alles im Rahmen",sub:"Die Ordnung",
story:{lbl:"Inspektionsbericht \u00b7 Gebäudeprüfer Kai \u00b7 Kontrollbezirk 9 \u00b7 07:00",
txt:"Morgens, 07:00. Kai \u00f6ffnet den Inspektionsbericht.\n\nTagesquote: 3,00 kWh. Keine \u00dcberschreitung.\nRecyclingnachweis: l\u00fcckenlos.\nCO2-Bilanz Block 12: im Rahmen.\n\nKai mag diese Klarheit. Jeder weiß, woran er ist. Keine Grauzonen, keine Unsicherheit. Die Stadt funktioniert, weil die Regeln funktionieren.\n\nPFAS-frei, RoHS-konform, REACH-gepr\u00fcft. Jedes Material dokumentiert, jeder Stoffstrom transparent. Seit den Verboten sind die Krebsraten um 40% gesunken. Die Luft ist sauber. Das Wasser ist sauber.\n\nDie Drohne scannt. Die Kamera dreht. Alles korrekt. Alles im Raster.\n\nVor zwei Jahren hat jemand seinen Balkon bepflanzt.\nOhne Genehmigung.\nEr wohnt jetzt woanders."},

no:"Lies Kais Bericht nochmal. Was wird als Ursache genannt? Achte auf den Earth Overshoot Day und die 'politische Antwort'."},

{t:"Nachweispflicht",sub:"Stadtgebiet",

txt:"Kai prüft den digitalen Produktpass von Gebäude 7.\n\nJedes Material lückenlos dokumentiert: vom Rohstoff über die Verarbeitung bis zum verbauten Bauteil. PFAS-frei, RoHS-konform, REACH-geprüft.\n\nWer nicht dokumentiert, verliert den Marktzugang.\nSo einfach ist das hier.\n\nAuf dem Weg zum nächsten Objekt zählt er die Kameras. 17 bis zum Bäcker.\nDie Kriminalität ist auf dem niedrigsten Stand seit Jahrzehnten.\nDie Stimmung auch.\n\nAm Quartierseingang: 'Sicher und sauber' steht auf dem Schild.\nDarunter hat jemand geschrieben: 'Und still.'"},

{t:"Die Regeln halten",sub:"Gebäude",
ref:"Der Mann mit dem Balkon. Die 17 Kameras. Die Stille am Quartierseingang. Jetzt sieht Kai, was hinter den korrekten Zahlen passiert.",
story:{lbl:"Feldnotiz \u00b7 Kai \u00b7 Freitagnachmittag",
txt:"Kai sitzt vor dem Prüfbericht für Block 14.\n\nAlles im Rahmen. Eigentlich.\n\nAber er hat bemerkt: Drei Gebäude halten die Energiequote nur ein, weil die Bewohner abends im Dunkeln sitzen. Nicht aus Überzeugung, aus Angst vor der automatischen Sanktion.\n\nDie Zahlen stimmen. Aber stimmt auch das, was dahinter passiert?\n\nEr denkt an den Mann mit dem Balkon. An die 17 Kameras. An das Schild: 'Sicher und sauber. Und still.'\n\nEr schreibt seinen Bericht. Fakten, keine Meinungen. So ist die Vorgabe.\n\nAber zum ersten Mal denkt er:\nDie Regeln halten, solange der Druck hält.\nWas passiert, wenn er nachlässt?"},

var SND=(function(){
var ctx=null,mG=null,aG=null,uG=null,on=false,ready=false,curAmb=null,curId='';
function init(){try{var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;ctx=new AC();mG=ctx.createGain();mG.gain.value=1;mG.connect(ctx.destination);aG=ctx.createGain();aG.gain.value=0.07;aG.connect(mG);uG=ctx.createGain();uG.gain.value=0.15;uG.connect(mG);ready=true;}catch(e){}}
function resume(){if(ctx&&ctx.state==='suspended')ctx.resume();}
function toggle(){on=!on;localStorage.setItem(SOUND_KEY,on?'1':'0');updBtn();if(on){if(!ready)init();resume();if(curId)amb(curId);}else stopAmb();}
function updBtn(){var b=document.getElementById('sndb');if(b)b.textContent=on?'\ud83d\udd0a':'\ud83d\udd07';}
function loadPref(){on=true;if(!localStorage.getItem(SOUND_KEY))localStorage.setItem(SOUND_KEY,'1');}
function stopAmb(){if(curAmb){try{curAmb.forEach(function(n){try{n.stop();}catch(e){}});}catch(e){}curAmb=null;}}
function amb(id){curId=id;/* V13: ambient drones removed, UI sounds only */}
function ui(type){if(!on||!ready||!ctx)return;resume();try{var t=ctx.currentTime;
if(type==='flip'){var o=ctx.createOscillator();o.type='triangle';o.frequency.value=680;o.frequency.exponentialRampToValueAtTime(920,t+0.08);var g=ctx.createGain();g.gain.value=0.09;g.gain.setTargetAtTime(0,t+0.06,0.025);o.connect(g);g.connect(uG);o.start();o.stop(t+0.14);}
else if(type==='ok'){var o1=ctx.createOscillator();o1.type='triangle';o1.frequency.value=523;var o2=ctx.createOscillator();o2.type='triangle';o2.frequency.value=659;var o3=ctx.createOscillator();o3.type='triangle';o3.frequency.value=784;var g=ctx.createGain();g.gain.value=0.10;g.gain.setTargetAtTime(0,t+0.35,0.1);o1.connect(g);o2.connect(g);o3.connect(g);g.connect(uG);o1.start();o2.start(t+0.08);o3.start(t+0.16);o1.stop(t+0.45);o2.stop(t+0.45);o3.stop(t+0.45);}
else if(type==='no'){var o1=ctx.createOscillator();o1.type='triangle';o1.frequency.value=370;var o2=ctx.createOscillator();o2.type='triangle';o2.frequency.value=310;var g=ctx.createGain();g.gain.value=0.08;g.gain.setTargetAtTime(0,t+0.25,0.06);o1.connect(g);o2.connect(g);g.connect(uG);o1.start();o1.stop(t+0.15);o2.start(t+0.12);o2.stop(t+0.3);}
else if(type==='click'){var o=ctx.createOscillator();o.type='triangle';o.frequency.value=900;var g=ctx.createGain();g.gain.value=0.05;g.gain.setTargetAtTime(0,t+0.025,0.01);o.connect(g);g.connect(uG);o.start();o.stop(t+0.06);}
else if(type==='whoosh'){var o=ctx.createOscillator();o.type='triangle';o.frequency.value=350;o.frequency.exponentialRampToValueAtTime(120,t+0.2);var lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=500;lp.Q.value=0.7;var g=ctx.createGain();g.gain.value=0.06;g.gain.setTargetAtTime(0,t+0.15,0.04);o.connect(lp);lp.connect(g);g.connect(uG);o.start();o.stop(t+0.25);}
}catch(e){}}
return{toggle:toggle,loadPref:loadPref,amb:amb,stopAmb:stopAmb,ui:ui,resume:resume,updBtn:updBtn};
})();

function flip(i){var cd=ca().cards[i];if(isGated(cd)||T.fl.indexOf(i)>=0)return;T.fl.push(i);SND.ui('flip');var el=document.getElementById('c'+i);if(el)el.classList.add('rev');var need=flipCount();if(T.fl.length>=need){setTimeout(function(){var ac=document.getElementById('ac');if(ac){var a=ca(),sc=cs();var nextLabel=(cs().id==='silent'&&S.act===0)?'Zum Nachtprotokoll \u2192':'Weiter \u2192';ac.innerHTML='<div class="narr an">'+nl(a.narr)+'</div><div class="center mt1 an" id="clueBtn" style="opacity:0;transition:opacity .6s"></div>';flipBtnDelay(sc.col,nextLabel);}},700);}}

function sub(){var cl=ca().chal,ok=false;if(cl.type==='select'){if(T.sel<0)return;ok=cl.opts[T.sel].ok;}else if(cl.type==='sort'){if(T.so.length!==cl.items.length)return;ok=T.so.every(function(v,i){return v===i;});}else if(cl.type==='classify'){if(!cl.items.every(function(_,i){return T.cl[i];}))return;ok=cl.items.every(function(it,i){return T.cl[i]===it.c;});}else if(cl.type==='multi'){if(T.ml.length!==cl.n)return;ok=T.ml.every(function(i){return cl.opts[i].ok;})&&T.ml.length===cl.opts.filter(function(o){return o.ok;}).length;}if(ok){SND.ui('ok');if(T.wc===0)S.ftc=(S.ftc||0)+1;S.da[ak(S.sc,S.act)]=true;var a=ca();S.jr.push(cs().t+' \u00b7 '+a.sub+': '+a.jrnl);if([0,1,2].every(function(ai){return isDone(S.sc,ai);})&&S.sc+1<SC.length)S.ul=Math.max(S.ul,S.sc+2);sv();var app=document.getElementById('app');if(app){app.classList.add('anim-glow');setTimeout(function(){app.classList.remove('anim-glow');go('result');},700);}else{go('result');}}else{SND.ui('no');T.w=true;T.wc++;var app=document.getElementById('app');if(app){app.classList.add('anim-shake');setTimeout(function(){app.classList.remove('anim-shake');go('chal');},500);}else{go('chal');}}}
